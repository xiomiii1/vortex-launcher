name: Mobile Cloud Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Extract Project Files
      run: |
        if [ -f "vortex-launcher.zip" ]; then
          echo "Zip file found! Extracting contents..."
          unzip -o vortex-launcher.zip
          rm vortex-launcher.zip
          
          # Fix Folder Nesting: If files were zipped inside a parent folder, move them out
          if [ -d "vortex-launcher" ]; then
            echo "Detected nested folder structure. Moving files to root workspace..."
            mv vortex-launcher/* . 2>/dev/null || true
            mv vortex-launcher/.* . 2>/dev/null || true
            rmdir vortex-launcher
          fi
        else
          echo "No zip file found, executing baseline repository scan."
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Auto-Generate Gradle Wrapper if Missing
      run: |
        if [ ! -f "gradlew" ]; then
          echo "gradlew is missing! Generating build wrapper scripts natively..."
          gradle wrapper --gradle-version 8.5
        else
          echo "gradlew execution script verified."
        fi

    - name: Setup and Execute Build
      uses: gradle/actions/setup-gradle@v4
      with:
        arguments: assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Vortex-Launcher-Build
        path: app/build/outputs/apk/debug/app-debug.apk
